# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

report_sizes: true

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

dockers_v2:
  - images:
      - "ghcr.io/skuethe/grafana-oss-team-sync"
    tags:
      - "{{ .Version }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.description": "{{ .ProjectName }}"
      "org.opencontainers.image.licenses": "GPL-3.0-or-later"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "https://github.com/skuethe/grafana-oss-team-sync"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.url": "https://github.com/skuethe/grafana-oss-team-sync"
      "org.opencontainers.image.version": "{{ .Version }}"
    dockerfile: build/package/Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true


nfpms:
- maintainer: skuethe <56306041+skuethe@users.noreply.github.com>
  description: |-
    Grafana OSS Team Sync
    Sync groups and users from external sources to Grafana without needing a Grafana Enterprise license
  homepage: https://github.com/skuethe/grafana-oss-team-sync
  formats:
  - apk
  - deb
  - rpm
  - archlinux


changelog:
  use: github-native
