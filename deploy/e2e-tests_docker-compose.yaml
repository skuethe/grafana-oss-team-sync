services:
  grafana:
    image: docker.io/grafana/grafana-oss:latest@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    restart: unless-stopped
    ports:
     - '3000:3000'
    depends_on:
      devproxy:
        condition: service_healthy

  devproxy:
    image: ghcr.io/dotnet/dev-proxy:2.3.4@sha256:e7796cf2c049d31884ca513468ecb13d918bfeca148bd25d8d31c2bd27757ae4
    container_name: devproxy
    ports:
    - '8000:8000'
    - '8897:8897'
    healthcheck:
      test: /bin/bash -c "echo >/dev/tcp/localhost/8897"
    volumes:
      - '../test/devproxy/configs:/config:ro'
