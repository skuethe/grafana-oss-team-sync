services:
  grafana:
    image: docker.io/grafana/grafana-oss:latest@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    restart: unless-stopped
    ports:
     - '3000:3000'


  grafana-oss-team-sync:
    image: localhost/grafana-oss-team-sync:dev
    container_name: grafana-oss-team-sync
    build:
      context: ../
      dockerfile: build/package/Dockerfile
    environment:
      GOTS_HOST: "grafana:3000"
      GOTS_RETRY: 10
      GOTS_AUTHFILE: "/app/.env"
      GOTS_CONFIG: "/app/configs/config.yaml"
    volumes:
      - '../:/app:Z'
